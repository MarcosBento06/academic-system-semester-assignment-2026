name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build project
        working-directory: academic-system
        run: mvn clean verify